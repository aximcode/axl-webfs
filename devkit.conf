# axl-webfs devkit manifest — declares what uefi-devkit stages from
# this project, how to name the binaries on the image, and how to
# build them when invoked via `uefi-devkit/build.sh --rebuild`.
#
# Read by uefi-devkit's parse_manifest() at stage time. The build:
# line delegates to uefi-devkit's scripts/build-make-both.sh helper
# (referenced via $PROJECT_ROOT — expanded at orchestrator-eval
# time), which loops both arches against $AXL_DIR/out and absorbs
# the orchestrator's trailing `--arch X64 --arch AARCH64` positional
# args.

desc: axl-webfs   Remote filesystem + HTTP file server

build: $PROJECT_ROOT/scripts/build-make-both.sh

binary  build/axl/${arch}/axl-webfs.efi         ${arch}/axl-webfs.efi
binary  build/axl/${arch}/axl-webfs-dxe.efi     ${arch}/axl-webfs-dxe.efi
script  scripts/xfer-server.py                  scripts/xfer-server.py
