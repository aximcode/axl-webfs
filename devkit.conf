# HttpFS devkit manifest
# Declares artifacts for uefi-devkit image builder

desc: HttpFS      File transfer
build: scripts/build.sh

binary  build/binaries/HttpFS_${ARCH}.efi       ${arch}/HttpFS.efi
binary  build/binaries/WebDavFsDxe_${ARCH}.efi    ${arch}/WebDavFsDxe.efi
script  scripts/xfer-server.py                     scripts/xfer-server.py
script  scripts/xfer.sh                            scripts/xfer.sh
